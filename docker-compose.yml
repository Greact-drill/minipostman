services:
  mini-postman:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-postman:latest
    container_name: mini-postman
    restart: unless-stopped
    environment:
      PORT: 4173
      LKDS_TOKEN_URL: ${LKDS_TOKEN_URL:-https://sso.lkds.alabuga.ru/realms/KIS/protocol/openid-connect/token}
      LKDS_USERNAME: ${LKDS_USERNAME:-admin}
      LKDS_PASSWORD: ${LKDS_PASSWORD:-admin}
      LKDS_CLIENT_ID: ${LKDS_CLIENT_ID:-postman}
      LKDS_CLIENT_SECRET: ${LKDS_CLIENT_SECRET:-l41I5Xtlos4EuhVOsD0stIR0upZYlDB0}
      LKDS_SCOPE: ${LKDS_SCOPE:-}
    # ports:
      # Nginx Proxy Manager can proxy to http://<docker-host-ip>:4173.
      # - "4173:4173"
    expose:
      # If NPM is attached to the same Docker network, proxy to http://mini-postman:4173.
      - "4173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
